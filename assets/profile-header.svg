<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93C5FD" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FDE68A" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .title { font: 700 46px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #DBEAFE; letter-spacing: 0.08em; }
      .body { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #E2E8F0; }
      .chip { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .micro { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #93C5FD; letter-spacing: 0.18em; }
      .grid line { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .trace { stroke-dasharray: 8 14; animation: drift 14s linear infinite; }
      .floatA { animation: floatA 6s ease-in-out infinite; }
      .floatB { animation: floatB 8s ease-in-out infinite; }
      .pulse { animation: pulse 4s ease-in-out infinite; transform-origin: center; }
      @keyframes drift { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -220; } }
      @keyframes floatA { 0%,100% { transform: translateY(0px);} 50% { transform: translateY(-8px);} }
      @keyframes floatB { 0%,100% { transform: translateY(0px);} 50% { transform: translateY(10px);} }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>
  <g class="grid">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="220" y1="0" x2="220" y2="320"/>
    <line x1="520" y1="0" x2="520" y2="320"/>
    <line x1="820" y1="0" x2="820" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <circle cx="1070" cy="94" r="110" fill="#60A5FA" opacity="0.18" filter="url(#blur)" class="pulse"/>
  <circle cx="1160" cy="230" r="80" fill="#FBBF24" opacity="0.18" filter="url(#blur)" class="pulse"/>

  <path d="M0 258C134 228 192 188 306 196C420 204 470 270 596 266C722 262 804 170 926 168C1048 166 1136 216 1280 188" stroke="url(#line)" stroke-width="3" class="trace" fill="none"/>
  <path d="M0 282C120 260 198 226 310 234C422 242 472 290 596 286C720 282 810 218 930 214C1050 210 1148 236 1280 222" stroke="rgba(255,255,255,0.28)" stroke-width="2" class="trace" fill="none"/>

  <g class="floatA">
    <rect x="66" y="58" width="154" height="34" rx="17" fill="rgba(15,23,42,0.34)" stroke="rgba(255,255,255,0.18)"/>
    <text x="88" y="80" class="micro">PROFILE SIGNAL</text>
  </g>

  <text x="66" y="142" class="title">Harshiv Mehta</text>
  <text x="68" y="176" class="subtitle">FULL-STACK DEVELOPER  |  B.TECH CSE STUDENT  |  AI ENTHUSIAST</text>
  <text x="68" y="220" class="body">Building polished digital products with frontend detail, backend logic,</text>
  <text x="68" y="246" class="body">and a practical product mindset.</text>

  <g class="floatB">
    <rect x="68" y="270" width="172" height="30" rx="15" fill="rgba(15,23,42,0.46)" stroke="rgba(147,197,253,0.5)"/>
    <text x="92" y="289" class="chip">Frontend polish</text>
  </g>
  <g class="floatA">
    <rect x="252" y="270" width="156" height="30" rx="15" fill="rgba(15,23,42,0.46)" stroke="rgba(147,197,253,0.45)"/>
    <text x="278" y="289" class="chip">Backend logic</text>
  </g>
  <g class="floatB">
    <rect x="420" y="270" width="166" height="30" rx="15" fill="rgba(15,23,42,0.46)" stroke="rgba(251,191,36,0.42)"/>
    <text x="446" y="289" class="chip">Product thinking</text>
  </g>

  <g transform="translate(918 56)">
    <rect width="280" height="188" rx="20" fill="rgba(15,23,42,0.42)" stroke="rgba(255,255,255,0.16)"/>
    <text x="26" y="38" class="micro">CURRENT FOCUS</text>
    <text x="26" y="76" class="chip">• Full-stack web apps</text>
    <text x="26" y="106" class="chip">• AI and data projects</text>
    <text x="26" y="136" class="chip">• Production-ready quality</text>
    <text x="26" y="166" class="chip">• Useful, clean UX</text>
  </g>
</svg>
